name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  arduino:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arduino
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Cache the PlatformIO core + downloaded packages (toolchains, frameworks).
      # Keyed on platformio.ini so toolchain changes invalidate the cache.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('arduino/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run host tests
        run: pio test -e native

      - name: Build firmware for Uno
        run: pio run -e uno

      - name: Build firmware for Robot
        run: pio run -e robot

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run --all-extras pytest

  # Browser-based dashboard visual/E2E suite, kept separate from the fast unit job.
  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies (dashboard + visual suite)
        run: uv sync --extra dashboard --group viz-test

      - name: Install Chromium
        run: uv run --group viz-test playwright install --with-deps chromium

      - name: Run visual + E2E suite
        run: uv run --extra dashboard --group viz-test pytest -m visual
