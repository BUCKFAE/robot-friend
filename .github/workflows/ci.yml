name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Cache the PlatformIO core + downloaded packages (toolchains, frameworks).
      # Keyed on platformio.ini so toolchain changes invalidate the cache.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run host tests
        run: pio test -e native

      - name: Build firmware for Uno
        run: pio run -e uno

      - name: Build firmware for Robot
        run: pio run -e robot

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: robot_friend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest
