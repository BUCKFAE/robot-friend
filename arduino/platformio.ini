; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = robot

[env]
test_framework = unity
build_flags =
  -Wall
  -Wextra

[env:uno]
platform = atmelavr
board = uno
framework = arduino

[env:robot]
platform = atmelavr
board = nanoatmega328
framework = arduino
board_upload.speed = 57600

[env:native]
platform = native
; src/main.cpp is the Arduino sketch — native cannot build it.
; Keep testable logic in lib/<Name>/ so it builds on both targets.
build_src_filter = -<*>
