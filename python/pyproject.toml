[project]
name = "robot-friend"
version = "0.1.0"
description = "Python side of robot-friend"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
robot-friend = "robot_friend.main:main"

[dependency-groups]
dev = [
    "pytest>=8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/robot_friend"]

[tool.pytest.ini_options]
testpaths = ["tests"]
